<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortener</title>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [url, setUrl] = React.useState('');
            const [result, setResult] = React.useState('');

            const handleCreate = async () => {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                setResult(window.location.origin + data.shortUrl);
            };

            return (
                <div class="flex flex-col items-center justify-center min-h-screen p-4">
                    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
                        <h1 class="text-xl font-bold mb-4 text-center">Shorten & Monetize</h1>
                        <input 
                            type="text" 
                            placeholder="Paste Long URL" 
                            class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-400"
                            value={url}
                            onChange={(e) => setUrl(e.target.value)}
                        />
                        <button onClick={handleCreate} class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">
                            Create Short Link
                        </button>
                        {result && (
                            <div class="mt-4 p-3 bg-green-50 border border-green-200 rounded text-center">
                                <p class="text-xs text-gray-500 mb-1">Copy your link:</p>
                                <a href={result} class="text-blue-600 break-all font-medium">{result}</a>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
